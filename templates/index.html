<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Study Flashcards</title>
  </head>
  <body>
    <h1>AI-Powered Study Flashcards</h1>
    <p>Starter Flask app is running.</p>

    <form action="/submit" method="post">
      <label for="topic">Study topic</label>
      <input
        id="topic"
        name="topic"
        type="text"
        placeholder="e.g., Biology"
        required
      />
      <button type="submit">Generate</button>
    </form>
  </body>
</html>
